server:
  port: 8083
spring:
  application:
    name: vault-server

  datasource:
    url: jdbc:postgresql://localhost:5432/vault_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true




